<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ranked Zone</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h1{margin-bottom:15px}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tabbtn{
  flex:1;
  padding:12px;
  background:#222;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
}

.tabbtn.active{
  background:#f4a000;
  color:black;
}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
}

button{
  padding:12px;
  background:#f4a000;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:8px;
}

.status{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
}

/* ГАРАНТИЯ что клики не блокируются */
*{
  pointer-events:auto !important;
}
</style>
</head>

<body>

<h1>Ranked Zone</h1>

<div class="tabs">
  <div class="tabbtn active" onclick="showTab('profile', this)">Профиль</div>
  <div class="tabbtn" onclick="showTab('match', this)">Матчмейкинг</div>
  <div class="tabbtn" onclick="showTab('admin', this)" id="adminTab" style="display:none;">Админ</div>
</div>

<div id="profile" class="card">
  <div>Telegram ID: <b id="tgId">...</b></div>
  <div>Роль: <b id="role">...</b></div>
  <div>Статус: <b id="verify">...</b></div>

  <input id="standoffId" placeholder="Standoff ID">
  <input id="standoffNick" placeholder="Ник">

  <button type="button" onclick="saveProfile()">Сохранить</button>
  <button type="button" onclick="testDb()">TEST DB</button>

  <div class="status" id="status">Загрузка...</div>
</div>

<div id="match" class="card" style="display:none;">
  Матчмейкинг работает 🚀
</div>

<div id="admin" class="card" style="display:none;">
  Админ панель 👑
</div>

<script>
const SUPABASE_URL = "https://wbjmvafzgwvspswchghx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_IkbenyjJMOsjztywoz0KXg_WJ3lHKqm";
const ADMIN_ID = 8001108991;

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const tg = window.Telegram?.WebApp;
if(tg){
  tg.ready();
  tg.expand();
}

const user = tg?.initDataUnsafe?.user;
const tgId = user?.id;

document.getElementById("tgId").innerText = tgId || "NULL";

function showTab(tab, el){
  document.getElementById("profile").style.display="none";
  document.getElementById("match").style.display="none";
  document.getElementById("admin").style.display="none";

  document.getElementById(tab).style.display="block";

  document.querySelectorAll(".tabbtn").forEach(b=>b.classList.remove("active"));
  if(el) el.classList.add("active");
}

async function loadUser(){
  if(!tgId){
    document.getElementById("status").innerText="Открой через кнопку в боте";
    return;
  }

  let {data,error}=await supabase
    .from("users")
    .select("*")
    .eq("tg_id",tgId)
    .maybeSingle();

  if(error){
    document.getElementById("status").innerText=error.message;
    return;
  }

  if(!data){
    await supabase.from("users").insert({
      tg_id:tgId,
      username:user?.username || null,
      first_name:user?.first_name || null,
      role:(tgId===ADMIN_ID?"admin":"user"),
      verify_status:"none"
    });
    return loadUser();
  }

  document.getElementById("role").innerText=data.role;
  document.getElementById("verify").innerText=data.verify_status;

  if(data.role==="admin"){
    document.getElementById("adminTab").style.display="block";
  }

  document.getElementById("status").innerText="Готово ✅";
}

async function saveProfile(){
  if(!tgId) return;

  await supabase.from("users").update({
    standoff_id:document.getElementById("standoffId").value,
    standoff_nick:document.getElementById("standoffNick").value,
    verify_status:"pending"
  }).eq("tg_id",tgId);

  loadUser();
}

async function testDb(){
  let {error}=await supabase.from("users").select("tg_id").limit(1);
  document.getElementById("status").innerText=error?error.message:"DB OK ✅";
}

loadUser();
</script>

</body>
</html>
