<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranked Zone</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
}

.wrap {
    padding: 20px;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.btn {
    background: #ff9f00;
    border: none;
    padding: 12px 16px;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.tabbtn {
    flex: 1;
    padding: 10px;
    background: #222;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
}

.tabbtn.active {
    background: #ff9f00;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>
<div class="wrap">

<h2>Ranked Zone</h2>

<div class="tabs">
<div class="tabbtn active" onclick="showTab('profile')">Профиль</div>
<div class="tabbtn" onclick="showTab('match')">Матчмейкинг</div>
<div class="tabbtn" onclick="showTab('admin')" id="adminTab" style="display:none;">Админ</div>
</div>

<div id="profile" class="card">
<div><b>Telegram ID:</b> <span id="tgId">...</span></div>
<div><b>Роль:</b> <span id="role">...</span></div>
<button class="btn" onclick="saveProfile()">Заполнить профиль</button>
</div>

<div id="match" class="card" style="display:none;">
<div>Матчмейкинг скоро будет 🚀</div>
</div>

<div id="admin" class="card" style="display:none;">
<div>Админ панель 👑</div>
</div>

</div>

<script>
const SUPABASE_URL = "https://wbjmvafzgwvspswchghx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_IkbenyjJMOsjztywoz0KXg_WJ3lHKqm";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const tg = window.Telegram.WebApp;
tg.ready();

document.addEventListener('touchstart', ()=>{}, {passive:true});

const user = tg.initDataUnsafe?.user;
const tgId = user?.id;

document.getElementById("tgId").innerText = tgId || "NULL";

async function loadUser() {
    if (!tgId) return;

    let { data } = await supabase
        .from("users")
        .select("*")
        .eq("tg_id", tgId)
        .single();

    if (data) {
        document.getElementById("role").innerText = data.role;

        if (data.role === "admin") {
            document.getElementById("adminTab").style.display = "block";
        }
    }
}

async function saveProfile() {
    const nick = prompt("Введите ник:");
    const standoff = prompt("Введите Standoff ID:");

    if (!nick || !standoff) return;

    await supabase
        .from("users")
        .upsert({
            tg_id: tgId,
            username: user.username,
            first_name: user.first_name,
            standoff_id: standoff,
            standoff_nick: nick
        });

    alert("Сохранено ✅");
}

function showTab(tab) {
    document.getElementById("profile").style.display = "none";
    document.getElementById("match").style.display = "none";
    document.getElementById("admin").style.display = "none";

    document.getElementById(tab).style.display = "block";

    document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
}

loadUser();
</script>

</body>
</html>
